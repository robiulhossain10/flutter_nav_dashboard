name: new_system_flutter
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  font_awesome_flutter: ^11.0.0
  get: ^4.7.3
  google_fonts: ^8.1.0
  google_nav_bar: ^5.0.7
  http: ^1.6.0
  material_symbols_icons: ^4.2951.0
  meta: 1.18.0
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  firebase_in_app_messaging: ^0.8.1+10

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

