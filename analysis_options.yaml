include: package:flutter_lints/flutter.yaml

analyzer:
  # প্রোডাকশন বিল্ডে কোনো Warning বা Lint এরর থাকলে অ্যাপ বিল্ড হতে দেবে না (Strict Quality)
  errors:
    todo: ignore
    missing_required_param: error
    missing_return: error
    must_call_super: error
    invalid_annotation_target: ignore

  # এনালাইসিস থেকে জেনারেটেড বা অটো-ক্রিয়েটেড ফাইলগুলো বাদ দেওয়া
  exclude:
    - "build/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # ১. কোড কোয়ালিটি এবং পারফরম্যান্স রুলস
    - avoid_print # প্রোডাকশন কোডে সরাসরি print() ব্যবহার নিষিদ্ধ (সবসময় debugPrint ব্যবহার করতে হবে)
    - unawaited_futures # কোনো Future মেথড await ছাড়া কল করলে ওয়ার্নিং দেবে (মেমোরি লিক আটকায়)
    - cancel_subscriptions # StreamSubscription ব্যবহার করলে সেটি close/cancel করা বাধ্যতামূলক
    - close_sinks # Sink বা Controller ব্যবহার করলে close করা বাধ্যতামূলক
    - prefer_const_constructors # পারফরম্যান্স বুস্ট করার জন্য যেখানে সম্ভব const ব্যবহার করতে বলবে
    - prefer_const_declarations
    - avoid_empty_else
    - avoid_relative_lib_imports # প্যাকেজ ইমপোর্ট করার সময় রিলেটিভ পাথ ব্যবহার করা যাবে না
    - no_duplicate_case_values

    # ২. টিম কোলাবোরেশন ও কোড স্টাইল রুলস
    - camel_case_types # ক্লাসের নাম CamelCase হতে হবে
    - library_names
    - file_names # ফাইলের নাম snake_case হতে হবে
    - curly_braces_in_flow_control_structures # single line if-else এও সেকেন্ড ব্র্যাকেট বাধ্যতামূলক
    - prefer_final_locals # যে ভ্যারিয়েবলের মান পরিবর্তন হয় না, সেগুলোকে final করতে বাধ্য করবে
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_iterable_whereType
